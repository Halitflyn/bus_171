<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Розклад маршрутки 171 Басівка ↔ Львів</title>
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#4caf50">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
</head>
<body class="light">

  <button class="theme-toggle" id="themeToggle" aria-label="Перемкнути світлу/темну тему">
    <div class="toggle-circle"></div>
  </button>

  <header class="tabs" role="tablist">
    <button class="tab" id="tab-weekdays" role="tab" aria-selected="false" aria-controls="weekdays" data-target="weekdays">Будні</button>
    <button class="tab" id="tab-weekend" role="tab" aria-selected="false" aria-controls="weekend" data-target="weekend">Субота-Неділя</button>
  </header>

  <main>
    <div id="weekdays" class="schedule" role="tabpanel" aria-labelledby="tab-weekdays">
      <div class="grid">
        <div class="card">
          <h3>Зі Басівки (1-й)</h3>
          <div class="times" id="wd-basivka-1"></div>
        </div>
        <div class="card">
          <h3>Зі Басівки (2-й)</h3>
          <div class="times" id="wd-basivka-2"></div>
        </div>
        <div class="card">
          <h3>Зі Львова (1-й)</h3>
          <div class="times" id="wd-lviv-1"></div>
        </div>
        <div class="card">
          <h3>Зі Львова (2-й)</h3>
          <div class="times" id="wd-lviv-2"></div>
        </div>
      </div>
    </div>

    <div id="weekend" class="schedule" role="tabpanel" aria-labelledby="tab-weekend">
      <div class="grid">
        <div class="card">
          <h3>Зі Басівки</h3>
          <div class="times" id="we-basivka"></div>
        </div>
        <div class="card">
          <h3>Зі Львова</h3>
          <div class="times" id="we-lviv"></div>
        </div>
      </div>
    </div>
    
    <div class="grid-info">
      <div class="card info-card">
        <h3>Інформація про маршрут</h3>
        
        <div id="prices-container">
           <p style="opacity: 0.7;">Завантаження цін...</p>
        </div>

        <p><strong>Приблизний час в дорозі:</strong> ~40-50 хв</p>
        
        <button id="shareButton">Поділитися сайтом</button>
      </div>
    </div>

  </main>
  
  <footer>
    🚍 Розклад маршрутки №171 Басівка ↔ Львів<br>
    <small id="last-updated">Завантаження актуальної дати...</small><br>
    Сайт створив Halitflyn © 2026
  </footer>
  
  <button id="scrollTopBtn" title="Наверх">▲</button>

  <script src="script.js"></script>
</body>
</html>
